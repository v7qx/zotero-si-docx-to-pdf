<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
  style="font-size: 1.08em; line-height: 1.5;"
>
  <groupbox style="padding: 8px 0 6px 0;">
    <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
    <description style="margin: 4px 0 14px 0;" data-l10n-id="pref-description"></description>
    <vbox style="margin: 0 0 14px 0;">
      <checkbox
        id="zotero-prefpane-__addonRef__-deleteOriginal"
        preference="deleteOriginal"
        data-l10n-id="pref-deleteOriginal"
      />
      <description data-l10n-id="pref-deleteOriginal-note"></description>
    </vbox>
    <vbox style="margin: 0 0 18px 0;">
      <checkbox
        id="zotero-prefpane-__addonRef__-backupBeforeDelete"
        preference="backupBeforeDelete"
        data-l10n-id="pref-backupBeforeDelete"
      />
      <hbox align="center" style="margin-top: 8px;">
        <html:label
          for="zotero-prefpane-__addonRef__-backupDirectory"
          data-l10n-id="pref-backupDirectory"
        ></html:label>
        <html:input
          type="text"
          id="zotero-prefpane-__addonRef__-backupDirectory"
          flex="1"
        ></html:input>
        <button
          id="zotero-prefpane-__addonRef__-browseBackupDirectory"
          data-l10n-id="pref-backupDirectory-browse"
        />
      </hbox>
      <description data-l10n-id="pref-backupDirectory-note"></description>
    </vbox>
    <vbox style="margin: 0 0 18px 0;">
      <html:label
        for="zotero-prefpane-__addonRef__-titleTemplate"
        data-l10n-id="pref-titleTemplate"
      ></html:label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-titleTemplate"
        rows="4"
        style="width: 100%; min-width: 42em; min-height: 8em; resize: vertical; font-size: 1.02em; line-height: 1.45;"
      ></html:textarea>
      <description data-l10n-id="pref-titleTemplate-note"></description>
      <html:a
        id="zotero-prefpane-__addonRef__-renameDocLink"
        href="#"
        style="margin-top: 4px;"
      >Zotero 官方文件重命名文档</html:a>
    </vbox>
    <vbox style="margin: 0 0 18px 0;">
      <hbox align="center">
        <html:label data-l10n-id="pref-backend"></html:label>
        <menulist
          id="zotero-prefpane-__addonRef__-backend"
          preference="backend"
          flex="1"
        >
          <menupopup>
            <menuitem value="libreoffice" data-l10n-id="pref-backend-libreoffice" />
            <menuitem value="word-windows-only" data-l10n-id="pref-backend-word" />
          </menupopup>
        </menulist>
      </hbox>
      <hbox align="center" style="margin-top: 10px;">
        <html:label
          for="zotero-prefpane-__addonRef__-libreOfficePath"
          data-l10n-id="pref-libreOfficePath"
        ></html:label>
        <html:input
          type="text"
          id="zotero-prefpane-__addonRef__-libreOfficePath"
          preference="libreOfficePath"
          flex="1"
        ></html:input>
        <button
          id="zotero-prefpane-__addonRef__-browseLibreOffice"
          data-l10n-id="pref-libreOfficePath-browse"
        />
      </hbox>
    </vbox>
    <vbox style="margin: 0 0 18px 0;">
      <checkbox
        id="zotero-prefpane-__addonRef__-showNotifications"
        preference="showNotifications"
        data-l10n-id="pref-showNotifications"
      />
    </vbox>
    <vbox style="margin: 0 0 12px 0;">
      <checkbox
        id="zotero-prefpane-__addonRef__-restrictByKeywords"
        preference="restrictByKeywords"
        data-l10n-id="pref-restrictByKeywords"
      />
    </vbox>
    <vbox style="margin: 0 0 8px 0;">
      <html:label
        for="zotero-prefpane-__addonRef__-keywordPattern"
        data-l10n-id="pref-keywordPattern"
      ></html:label>
      <html:textarea
        id="zotero-prefpane-__addonRef__-keywordPattern"
        rows="3"
        style="width: 100%; min-width: 42em; min-height: 5.5em; resize: vertical; font-size: 1.02em; line-height: 1.45;"
      ></html:textarea>
      <description data-l10n-id="pref-keywordPattern-note"></description>
    </vbox>
  </groupbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
